services:
  mist-hackathon:
    build: .
    ports:
      - "5001:5001"
    volumes:
      # Persists the Flask secret key across container restarts so
      # existing browser sessions stay valid after a redeploy.
      - mist-secrets:/app/secrets
    environment:
      - FLASK_SECRET_DIR=/app/secrets
    restart: unless-stopped

volumes:
  mist-secrets:
