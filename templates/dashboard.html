<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mist Network Health</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #20243a;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --muted: #6b7280;
      --blue: #0072ce;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --orange: #f97316;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #0072ce, #00b4d8);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-pill {
      font-size: 13px;
      color: var(--muted);
    }

    .refresh-btn, .logout-btn {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--text);
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: var(--surface2); }
    .logout-btn { color: var(--muted); }
    .logout-btn:hover { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

    /* ── Main layout ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 28px 60px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .page-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Loading / Error states ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
      color: var(--muted);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-banner {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      color: #f87171;
      margin-bottom: 24px;
    }

    #content { display: none; }

    /* ── Org section ── */
    .org-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .org-badge {
      font-size: 11px;
      padding: 3px 8px;
      background: rgba(0,114,206,0.15);
      color: #60a5fa;
      border-radius: 4px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .org-name {
      font-size: 18px;
      font-weight: 600;
    }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.blue  { color: #60a5fa; }

    .stat-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Section heading ── */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Alarms ── */
    .alarms-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .alarms-box .box-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .box-head-title {
      font-size: 14px;
      font-weight: 600;
    }

    .badge {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }

    .badge-red    { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-green  { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-gray   { background: rgba(107,114,128,0.15); color: var(--muted); }

    .alarm-row {
      display: grid;
      grid-template-columns: 90px 1fr 110px 80px;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      align-items: center;
    }

    .alarm-row:last-child { border-bottom: none; }
    .alarm-row:hover { background: var(--surface2); }

    .alarm-sev {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      text-align: center;
    }

    .sev-critical { background: rgba(239,68,68,0.15); color: var(--red); }
    .sev-major    { background: rgba(249,115,22,0.15); color: var(--orange); }
    .sev-minor    { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .sev-warn     { background: rgba(245,158,11,0.1);  color: var(--yellow); }
    .sev-info     { background: rgba(0,114,206,0.1);   color: #60a5fa; }

    .alarm-type { color: var(--text); font-weight: 500; }
    .alarm-site { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .alarm-time { color: var(--muted); font-size: 12px; }

    .empty-row {
      padding: 24px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Marvis actions ── */
    .marvis-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .marvis-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .marvis-row:last-child { border-bottom: none; }
    .marvis-row:hover { background: var(--surface2); }

    .marvis-icon {
      width: 32px; height: 32px; flex-shrink: 0;
      background: rgba(0,114,206,0.1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .marvis-title { font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .marvis-impact { color: var(--muted); font-size: 12px; }

    /* ── Sites table ── */
    .sites-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 36px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    .site-name { font-weight: 500; }

    .device-stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pct-bar {
      width: 60px; height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .pct-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s;
    }

    .pct-fill.green { background: var(--green); }
    .pct-fill.yellow { background: var(--yellow); }
    .pct-fill.red { background: var(--red); }

    .client-count {
      font-size: 14px;
      font-weight: 600;
      color: #60a5fa;
    }

    /* ── Org separator ── */
    .org-section { margin-bottom: 48px; }

    /* ── Health pill ── */
    .health-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .health-good   { background: rgba(34,197,94,0.12);  color: var(--green); }
    .health-warn   { background: rgba(245,158,11,0.12); color: var(--yellow); }
    .health-bad    { background: rgba(239,68,68,0.12);  color: var(--red); }

    .health-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .last-updated {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      margin-top: -20px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">M</div>
    Mist Network Health
  </div>
  <div class="header-right">
    <span class="user-pill">{{ user_name }}</span>
    <button class="refresh-btn" onclick="load()">&#8635; Refresh</button>
    <a href="/logout"><button class="logout-btn">Sign out</button></a>
  </div>
</header>

<main>
  <div class="page-title">How's my network?</div>
  <div class="page-sub">Live summary across all your Mist organizations</div>

  <div id="loading">
    <div class="spinner"></div>
    <span>Fetching network data from Mist API…</span>
  </div>

  <div id="error-banner"></div>
  <div id="content"></div>
</main>

<script>
function timeAgo(epochSec) {
  const diff = Math.floor(Date.now() / 1000) - epochSec;
  if (diff < 60)    return `${diff}s ago`;
  if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function sevClass(sev) {
  const s = (sev || "").toLowerCase();
  if (s === "critical") return "sev-critical";
  if (s === "major")    return "sev-major";
  if (s === "minor")    return "sev-minor";
  if (s === "warn" || s === "warning") return "sev-warn";
  return "sev-info";
}

function healthClass(connected, total) {
  if (total === 0) return "";
  const pct = connected / total;
  if (pct >= 0.95) return "health-good";
  if (pct >= 0.75) return "health-warn";
  return "health-bad";
}

function pctClass(connected, total) {
  if (total === 0) return "green";
  const pct = connected / total;
  if (pct >= 0.95) return "green";
  if (pct >= 0.75) return "yellow";
  return "red";
}

function renderOrg(org) {
  const disconnected = org.num_devices_disconnected || 0;
  const connected    = org.num_devices_connected    || 0;
  const total        = org.num_devices              || 0;
  const alarmCount   = org.active_alarms            || 0;
  const clients      = org.num_clients              || 0;
  const sites        = org.num_sites                || 0;

  // Overall health pill
  let healthLabel = "Healthy", healthCls = "health-good";
  if (alarmCount > 0 || disconnected > 0) {
    healthLabel = disconnected > total * 0.1 ? "Degraded" : "Warning";
    healthCls   = disconnected > total * 0.1 ? "health-bad" : "health-warn";
  }

  // Sites table rows
  const siteRows = (org.sites || []).map(site => {
    const apTotal = site.num_ap || 0;
    const apConn  = site.num_ap_connected || 0;
    const swTotal = site.num_switches || 0;
    const swConn  = site.num_switches_connected || 0;
    const gwTotal = site.num_gateways || 0;
    const gwConn  = site.num_gateways_connected || 0;

    function devCell(conn, total) {
      if (total === 0) return `<span style="color:var(--muted)">—</span>`;
      const pct = total > 0 ? Math.round(conn/total*100) : 0;
      const cls = pctClass(conn, total);
      return `
        <div class="device-stat">
          <span>${conn}/${total}</span>
          <div class="pct-bar"><div class="pct-fill ${cls}" style="width:${pct}%"></div></div>
        </div>`;
    }

    return `
      <tr>
        <td class="site-name">${site.name}</td>
        <td>${devCell(apConn, apTotal)}</td>
        <td>${devCell(swConn, swTotal)}</td>
        <td>${devCell(gwConn, gwTotal)}</td>
        <td><span class="client-count">${site.num_clients || 0}</span></td>
      </tr>`;
  }).join("");

  // Alarms
  const alarmRows = (org.alarm_details || []).length === 0
    ? `<div class="empty-row">&#10003; No active alarms</div>`
    : (org.alarm_details || []).map(a => `
        <div class="alarm-row">
          <span class="alarm-sev ${sevClass(a.severity)}">${a.severity || "?"}</span>
          <div>
            <div class="alarm-type">${a.type || "Unknown"}</div>
            <div class="alarm-site">${a.site_name || a.group || ""}</div>
          </div>
          <div class="alarm-time">${a.timestamp ? timeAgo(a.timestamp) : ""}</div>
          <div style="color:var(--muted);font-size:12px">×${a.count || 1}</div>
        </div>`).join("");

  // Marvis actions
  const marvisRows = (org.marvis_actions || []).length === 0
    ? `<div class="empty-row">&#10003; No Marvis actions at this time</div>`
    : (org.marvis_actions || []).map(a => `
        <div class="marvis-row">
          <div class="marvis-icon">&#128161;</div>
          <div>
            <div class="marvis-title">${a.title || a.action || "Action"}</div>
            <div class="marvis-impact">${a.impact || a.site_name || ""}</div>
          </div>
          ${a.severity ? `<span class="badge ${a.severity === 'critical' ? 'badge-red' : 'badge-yellow'}">${a.severity}</span>` : ""}
        </div>`).join("");

  return `
    <div class="org-section">
      <div class="org-header">
        <span class="org-badge">ORG</span>
        <span class="org-name">${org.org_name}</span>
        <span class="health-pill ${healthCls}">
          <span class="health-dot"></span>${healthLabel}
        </span>
      </div>

      <div class="summary-grid">
        <div class="stat-card">
          <div class="stat-label">Total Devices</div>
          <div class="stat-value">${total}</div>
          <div class="stat-sub">${sites} site${sites !== 1 ? "s" : ""}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Connected</div>
          <div class="stat-value green">${connected}</div>
          <div class="stat-sub">${total > 0 ? Math.round(connected/total*100) : 0}% online</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Disconnected</div>
          <div class="stat-value ${disconnected > 0 ? "red" : ""}">${disconnected}</div>
          <div class="stat-sub">${disconnected > 0 ? "needs attention" : "none"}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Clients</div>
          <div class="stat-value blue">${clients}</div>
          <div class="stat-sub">connected now</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Alarms</div>
          <div class="stat-value ${alarmCount > 0 ? "yellow" : ""}">${alarmCount}</div>
          <div class="stat-sub">${alarmCount > 0 ? "unresolved" : "all clear"}</div>
        </div>
      </div>

      <div class="section-title">
        <span class="dot" style="background:var(--red)"></span>
        Active Alarms
      </div>
      <div class="alarms-box">
        <div class="box-head">
          <span class="box-head-title">Unresolved Alarms</span>
          <span class="badge ${alarmCount > 0 ? 'badge-red' : 'badge-green'}">${alarmCount} active</span>
        </div>
        ${alarmRows}
      </div>

      <div class="section-title">
        <span class="dot" style="background:var(--blue)"></span>
        Marvis AI Actions
      </div>
      <div class="marvis-box">
        <div class="box-head">
          <span class="box-head-title">AI Recommendations</span>
        </div>
        ${marvisRows}
      </div>

      <div class="section-title">
        <span class="dot" style="background:var(--green)"></span>
        Sites
      </div>
      <div class="sites-box">
        <table>
          <thead>
            <tr>
              <th>Site</th>
              <th>APs (conn/total)</th>
              <th>Switches</th>
              <th>Gateways</th>
              <th>Clients</th>
            </tr>
          </thead>
          <tbody>
            ${siteRows || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">No sites found</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

async function load() {
  const loadingEl = document.getElementById("loading");
  const contentEl = document.getElementById("content");
  const errorEl   = document.getElementById("error-banner");

  loadingEl.style.display = "flex";
  contentEl.style.display = "none";
  errorEl.style.display   = "none";

  try {
    const res = await fetch("/api/network-health");
    const data = await res.json();

    if (!res.ok) {
      if (data.mfa_required) {
        window.location.href = "/login?mfa=1";
        return;
      }
      if (data.reauth) {
        window.location.href = "/login";
        return;
      }
      throw new Error(data.error || `HTTP ${res.status}`);
    }

    const orgs = data.orgs || [];
    if (orgs.length === 0) {
      contentEl.innerHTML = `<div style="color:var(--muted);text-align:center;padding:60px">No organizations found.</div>`;
    } else {
      contentEl.innerHTML =
        `<div class="last-updated">Last updated: ${new Date().toLocaleTimeString()}</div>` +
        orgs.map(renderOrg).join("");
    }

    loadingEl.style.display = "none";
    contentEl.style.display = "block";

  } catch (err) {
    loadingEl.style.display = "none";
    errorEl.style.display   = "block";
    errorEl.textContent     = `Error loading network data: ${err.message}`;
  }
}

load();
// Auto-refresh every 60 seconds
setInterval(load, 60000);
</script>
</body>
</html>
