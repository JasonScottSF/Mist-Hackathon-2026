<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Inventory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #20243a;
      --border: #2a2d3a; --text: #e8eaf0; --muted: #6b7280;
      --purple: #7c3aed; --indigo: #4f46e5;
      --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --blue: #3b82f6;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 30;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--purple), var(--indigo));
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 15px; color: #fff;
    }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .user-name { font-size: 13px; color: var(--muted); }
    .btn-ghost {
      font-size: 13px; padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .tab-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 28px; display: flex; align-items: flex-end; gap: 4px;
      position: sticky; top: 56px; z-index: 20;
    }
    .tab {
      font-size: 13px; font-weight: 500; color: var(--muted);
      padding: 10px 16px; border-bottom: 2px solid transparent;
      text-decoration: none; white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      display: flex; align-items: center; gap: 6px; margin-bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--purple); }

    main { max-width: 1400px; margin: 0 auto; padding: 28px 28px 80px; }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; min-height: 300px; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--purple); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-banner {
      display: none; background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3); border-radius: 10px;
      color: #f87171; padding: 14px 18px; margin-bottom: 18px; font-size: 13px;
    }
    #content { display: none; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 12px;
    }
    .search-input {
      padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: 13px; outline: none;
      width: 220px; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--purple); }
    .search-input::placeholder { color: var(--muted); }

    .type-filters { display: flex; gap: 4px; }
    .type-btn {
      padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px;
      font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .type-btn:hover { border-color: var(--purple); color: var(--text); }
    .type-btn.active { background: rgba(124,58,237,0.15); border-color: var(--purple); color: #a78bfa; }

    .toolbar-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

    .sel-group { display: flex; align-items: center; gap: 6px; }
    .sel-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .btn-sm {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .btn-sm:hover { background: var(--surface2); color: var(--text); }

    .ver-input {
      padding: 6px 10px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 12px; font-family: monospace;
      width: 150px; outline: none;
    }
    .ver-input:focus { border-color: var(--purple); }

    /* ── Upgrade bar ── */
    #upgrade-bar {
      display: none;
      background: var(--surface2); border: 1px solid var(--purple);
      border-radius: 8px; padding: 14px 18px;
      flex-direction: column; gap: 10px;
      margin-bottom: 12px;
    }
    .upgrade-header { font-size: 13px; font-weight: 600; color: #a78bfa; }
    .upgrade-type-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .upgrade-type-label {
      font-size: 12px; color: var(--muted); white-space: nowrap;
      min-width: 160px;
    }
    .upgrade-ver-input {
      padding: 7px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px; font-family: monospace;
      width: 210px; outline: none;
    }
    .upgrade-ver-input:focus { border-color: var(--purple); }
    .upgrade-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-upgrade {
      padding: 8px 20px; border-radius: 7px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--purple), var(--indigo));
      color: #fff; font-size: 13px; font-weight: 600;
    }
    .btn-upgrade:hover { opacity: 0.88; }
    .btn-upgrade:disabled { opacity: 0.4; cursor: not-allowed; }
    .upgrade-result {
      font-size: 13px; padding: 8px 14px; border-radius: 6px; line-height: 1.6;
    }
    .upgrade-result.ok    { background: rgba(34,197,94,0.12);  color: var(--green); }
    .upgrade-result.error { background: rgba(239,68,68,0.12);  color: var(--red);   }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }

    thead th {
      padding: 10px 14px; background: var(--surface);
      text-align: left; font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10; user-select: none;
      white-space: nowrap;
    }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { color: var(--text); }
    thead th.sort-asc  { color: var(--text); }
    thead th.sort-desc { color: var(--text); }
    .sort-arrow { margin-left: 4px; font-size: 10px; }

    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody tr.selected { background: rgba(124,58,237,0.08); }
    tbody tr.selected:hover { background: rgba(124,58,237,0.14); }
    tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }

    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
    .dot-connected    { background: var(--green); box-shadow: 0 0 5px rgba(34,197,94,0.5); }
    .dot-disconnected { background: var(--red); }
    .dot-other        { background: var(--muted); }

    .type-chip {
      font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .chip-ap      { background: rgba(59,130,246,0.15);  color: var(--blue);   }
    .chip-switch  { background: rgba(34,197,94,0.15);   color: var(--green);  }
    .chip-gateway { background: rgba(245,158,11,0.15);  color: var(--yellow); }

    .ver-chip {
      font-family: monospace; font-size: 12px; padding: 2px 8px;
      background: var(--surface2); border-radius: 4px; color: var(--text);
      border: 1px solid var(--border);
    }

    .no-rows { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    .device-count { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">&#8644;</div>
    DPC → NAC Converter
  </div>
  <div class="header-right">
    <span class="user-name">{{ user_name }}</span>
    <a class="btn-ghost" href="/orgs">&#8592; Orgs</a>
    <a class="btn-ghost" href="/logout">Sign out</a>
  </div>
</header>

<nav class="tab-bar">
  <a class="tab"        data-tab-id="health"       href="/health/{{ org_id }}">&#128246; Network Health</a>
  <a class="tab active" data-tab-id="inventory"    href="/inventory/{{ org_id }}">&#128196; Device Inventory</a>
  <a class="tab"        data-tab-id="troubleshoot" href="/troubleshoot/{{ org_id }}">&#129658; Troubleshooting</a>
  <a class="tab"        data-tab-id="bestpractices" href="/bestpractices/{{ org_id }}">&#9989; Best Practices</a>
  <a class="tab"        data-tab-id="dpc"           href="/scan/{{ org_id }}">&#8644; DPC → NAC</a>
</nav>

<main>
  <div class="page-title">Device Inventory</div>
  <div class="page-sub">All APs, switches, and gateways &mdash; <code style="font-size:11px;color:#a78bfa">{{ org_id }}</code></div>

  <div id="loading"><div class="spinner"></div><span>Loading devices…</span></div>
  <div id="error-banner"></div>
  <div id="content"></div>
</main>

<datalist id="ver-datalist"></datalist>
<datalist id="avail-datalist"></datalist>

<script>
const ORG_ID = {{ org_id | tojson }};

let allDevices  = [];
let availVers   = {};
let sortCol     = "name";
let sortAsc     = true;
let typeFilter  = "all";
let searchTerm  = "";
let selectedIds = new Set();

// ── Helpers ──────────────────────────────────────────────────────────────────

function versionCmp(a, b) {
  a = a || ""; b = b || "";
  const pa = a.split(/[.\-]/).map(n => isNaN(n) ? n : parseInt(n, 10));
  const pb = b.split(/[.\-]/).map(n => isNaN(n) ? n : parseInt(n, 10));
  const len = Math.max(pa.length, pb.length);
  for (let i = 0; i < len; i++) {
    const na = pa[i] ?? 0, nb = pb[i] ?? 0;
    if (na === nb) continue;
    if (typeof na === "number" && typeof nb === "number") return na - nb;
    return String(na).localeCompare(String(nb));
  }
  return 0;
}

function formatUptime(s) {
  if (!s) return "—";
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function typeChip(t) {
  const map = { ap: "chip-ap", switch: "chip-switch", gateway: "chip-gateway" };
  return `<span class="type-chip ${map[t] || ""}">${t}</span>`;
}

function statusDot(s) {
  const cls = s === "connected" ? "dot-connected" : s === "disconnected" ? "dot-disconnected" : "dot-other";
  return `<span class="status-dot ${cls}"></span>${s || "—"}`;
}

// ── Filtering & sorting ───────────────────────────────────────────────────────

function visibleDevices() {
  return allDevices.filter(d => {
    if (typeFilter !== "all" && d.type !== typeFilter) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      if (!(d.name || "").toLowerCase().includes(q) &&
          !(d.model || "").toLowerCase().includes(q) &&
          !(d.ip || "").includes(q) &&
          !(d.mac || "").includes(q) &&
          !(d.site_name || "").toLowerCase().includes(q) &&
          !(d.version || "").includes(q)) return false;
    }
    return true;
  }).sort((a, b) => {
    let va = a[sortCol] ?? "", vb = b[sortCol] ?? "";
    let cmp;
    if (sortCol === "version") {
      cmp = versionCmp(String(va), String(vb));
    } else if (sortCol === "uptime") {
      cmp = (Number(va) || 0) - (Number(vb) || 0);
    } else {
      cmp = String(va).localeCompare(String(vb));
    }
    return sortAsc ? cmp : -cmp;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderTable() {
  const devices = visibleDevices();
  const tbody   = document.getElementById("device-tbody");
  const count   = document.getElementById("device-count");
  const selAll  = document.getElementById("sel-all-check");

  count.textContent = `${devices.length} device${devices.length !== 1 ? "s" : ""}`;

  if (!devices.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="no-rows">No devices match your filter.</td></tr>`;
    updateSelAll();
    return;
  }

  tbody.innerHTML = devices.map(d => {
    const checked = selectedIds.has(d.id) ? "checked" : "";
    const rowCls  = selectedIds.has(d.id) ? "selected" : "";
    return `
      <tr class="${rowCls}" data-id="${d.id}">
        <td><input type="checkbox" ${checked} onchange="toggleRow('${d.id}', this.checked)"></td>
        <td style="font-weight:500">${d.name || d.mac || "—"}</td>
        <td>${typeChip(d.type)}</td>
        <td style="color:var(--muted)">${d.model || "—"}</td>
        <td style="color:var(--muted)">${d.site_name || "—"}</td>
        <td>${statusDot(d.status)}</td>
        <td style="font-family:monospace;font-size:12px">${d.ip || "—"}</td>
        <td><span class="ver-chip">${d.version || "—"}</span></td>
        <td style="color:var(--muted)">${formatUptime(d.uptime)}</td>
      </tr>`;
  }).join("");

  updateSelAll();
  updateUpgradeBar();
}

function updateSortHeaders() {
  document.querySelectorAll("thead th.sortable").forEach(th => {
    const col = th.dataset.col;
    th.classList.remove("sort-asc", "sort-desc");
    th.querySelector(".sort-arrow").textContent = "";
    if (col === sortCol) {
      th.classList.add(sortAsc ? "sort-asc" : "sort-desc");
      th.querySelector(".sort-arrow").textContent = sortAsc ? "↑" : "↓";
    }
  });
}

// ── Sort ──────────────────────────────────────────────────────────────────────

function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = true; }
  updateSortHeaders();
  renderTable();
}

// ── Selection ─────────────────────────────────────────────────────────────────

function toggleRow(id, checked) {
  checked ? selectedIds.add(id) : selectedIds.delete(id);
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if (row) row.classList.toggle("selected", checked);
  updateSelAll();
  updateUpgradeBar();
}

function updateSelAll() {
  const vis  = visibleDevices();
  const chk  = document.getElementById("sel-all-check");
  if (!chk) return;
  const selCount = vis.filter(d => selectedIds.has(d.id)).length;
  chk.checked       = vis.length > 0 && selCount === vis.length;
  chk.indeterminate = selCount > 0 && selCount < vis.length;
}

function toggleAll(checked) {
  visibleDevices().forEach(d => checked ? selectedIds.add(d.id) : selectedIds.delete(d.id));
  renderTable();
}

function selectVersion(invert) {
  const ver = document.getElementById("ver-filter").value.trim();
  if (!ver) return;
  visibleDevices().forEach(d => {
    const match = (d.version || "") === ver;
    (invert ? !match : match) ? selectedIds.add(d.id) : null;
  });
  renderTable();
}

function clearSelection() {
  selectedIds.clear();
  renderTable();
}

function updateUpgradeBar() {
  const bar = document.getElementById("upgrade-bar");
  if (!selectedIds.size) { bar.style.display = "none"; return; }

  // Group selected devices by type
  const byType = {};
  allDevices.filter(d => selectedIds.has(d.id)).forEach(d => {
    const t = d.type || "ap";
    if (!byType[t]) byType[t] = [];
    byType[t].push(d.id);
  });

  const total     = selectedIds.size;
  const breakdown = Object.entries(byType).map(([t, ids]) => `${ids.length} ${t}`).join(", ");
  const TYPE_LABELS = { ap: "AP", switch: "Switch", gateway: "Gateway" };

  const typeRows = Object.entries(byType).map(([t, ids]) => {
    const label   = `${TYPE_LABELS[t] || t} firmware (${ids.length} device${ids.length !== 1 ? "s" : ""}):`;
    const options = (availVers[t] || []).map(v => `<option value="${v}">`).join("");
    return `
      <div class="upgrade-type-row">
        <span class="upgrade-type-label">${label}</span>
        <input class="upgrade-ver-input" id="target-version-${t}"
               list="avail-datalist-${t}" placeholder="${t} version…">
        <datalist id="avail-datalist-${t}">${options}</datalist>
      </div>`;
  }).join("");

  bar.innerHTML = `
    <div class="upgrade-header">
      ${total} device${total !== 1 ? "s" : ""} selected &mdash; ${breakdown}
    </div>
    ${typeRows}
    <div class="upgrade-actions">
      <button class="btn-upgrade" id="upgrade-btn" onclick="upgradeSelected()">Upgrade</button>
      <div id="upgrade-result" style="display:none" class="upgrade-result"></div>
    </div>`;

  bar.style.display = "flex";
}

// ── Version datalists ─────────────────────────────────────────────────────────

function populateDatalist(id, versions) {
  const dl = document.getElementById(id);
  dl.innerHTML = [...new Set(versions)].sort(versionCmp).reverse()
    .map(v => `<option value="${v}">`).join("");
}

// ── Upgrade ───────────────────────────────────────────────────────────────────

async function upgradeSelected() {
  if (!selectedIds.size) return;

  // Build per-type upgrade jobs from the dynamic inputs
  const byType = {};
  allDevices.filter(d => selectedIds.has(d.id)).forEach(d => {
    const t = d.type || "ap";
    if (!byType[t]) byType[t] = [];
    byType[t].push(d.id);
  });

  const jobs = [];
  for (const [t, ids] of Object.entries(byType)) {
    const version = (document.getElementById(`target-version-${t}`)?.value || "").trim();
    if (!version) { alert(`Please enter a target firmware version for ${t} devices.`); return; }
    jobs.push({ type: t, device_ids: ids, version });
  }

  const summary = jobs.map(j => `  ${j.device_ids.length} ${j.type} → ${j.version}`).join("\n");
  if (!confirm(`Upgrade the following?\n\n${summary}\n\nDevices will reboot when the download completes.`)) return;

  const btn      = document.getElementById("upgrade-btn");
  const resultEl = document.getElementById("upgrade-result");
  btn.disabled   = true;
  btn.textContent = "Upgrading…";
  resultEl.style.display = "none";

  const results = [];
  for (const job of jobs) {
    try {
      const res  = await fetch(`/api/upgrade/${ORG_ID}`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ device_ids: job.device_ids, version: job.version }),
      });
      const data = await res.json();
      results.push({
        type: job.type, count: job.device_ids.length, version: job.version,
        ok:   res.ok && data.status === "ok",
        detail: data.detail || data.error || "",
      });
    } catch (e) {
      results.push({ type: job.type, count: job.device_ids.length, version: job.version, ok: false, detail: e.message });
    }
  }

  resultEl.style.display = "block";
  const allOk = results.every(r => r.ok);
  resultEl.className = `upgrade-result ${allOk ? "ok" : "error"}`;
  resultEl.innerHTML = results.map(r =>
    `${r.ok ? "✓" : "✗"} ${r.type}: ${r.count} device${r.count !== 1 ? "s" : ""} → ${r.version}${r.detail ? ` — ${r.detail}` : ""}`
  ).join("<br>");

  if (allOk) { selectedIds.clear(); renderTable(); }

  btn.disabled    = false;
  btn.textContent = "Upgrade";
}

// ── Load ──────────────────────────────────────────────────────────────────────

async function load() {
  const loadEl = document.getElementById("loading");
  const errEl  = document.getElementById("error-banner");
  const contEl = document.getElementById("content");

  loadEl.style.display = "flex";
  contEl.style.display = "none";
  errEl.style.display  = "none";

  try {
    const res  = await fetch(`/api/inventory/${ORG_ID}`);
    const data = await res.json();
    if (!res.ok) {
      if (data.error === "Not authenticated") { window.location.href = "/login"; return; }
      throw new Error(data.error || `HTTP ${res.status}`);
    }

    allDevices = data.devices || [];
    availVers  = data.avail_versions || {};

    // Populate version filter datalist with unique current versions
    const curVersions = [...new Set(allDevices.map(d => d.version).filter(Boolean))];
    populateDatalist("ver-datalist", curVersions);

    // Populate upgrade target datalist with all available versions
    const allAvail = Object.values(availVers).flat().filter(Boolean);
    populateDatalist("avail-datalist", allAvail.length ? allAvail : curVersions);

    contEl.innerHTML = `
      <div class="toolbar">
        <input class="search-input" id="search-box" placeholder="Search name, model, IP, version…" oninput="onSearch(this.value)">
        <div class="type-filters">
          <button class="type-btn active" data-type="all"     onclick="setType('all',this)">All</button>
          <button class="type-btn"        data-type="ap"      onclick="setType('ap',this)">AP</button>
          <button class="type-btn"        data-type="switch"  onclick="setType('switch',this)">Switch</button>
          <button class="type-btn"        data-type="gateway" onclick="setType('gateway',this)">Gateway</button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="sel-group">
          <span class="sel-label">Select:</span>
          <button class="btn-sm" onclick="toggleAll(true)">All</button>
          <button class="btn-sm" onclick="clearSelection()">None</button>
        </div>
        <div class="sel-group">
          <span class="sel-label">Version:</span>
          <input class="ver-input" id="ver-filter" list="ver-datalist" placeholder="e.g. 0.14.29688">
          <button class="btn-sm" onclick="selectVersion(false)" title="Select all devices running this version">Matching</button>
          <button class="btn-sm" onclick="selectVersion(true)"  title="Select all devices NOT on this version">Others</button>
        </div>
      </div>

      <div id="upgrade-bar"></div>

      <div class="device-count" id="device-count"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:36px"><input type="checkbox" id="sel-all-check" onchange="toggleAll(this.checked)"></th>
              <th class="sortable" data-col="name"      onclick="sortBy('name')">Name <span class="sort-arrow">↑</span></th>
              <th class="sortable" data-col="type"      onclick="sortBy('type')">Type <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="model"     onclick="sortBy('model')">Model <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="site_name" onclick="sortBy('site_name')">Site <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="status"    onclick="sortBy('status')">Status <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="ip"        onclick="sortBy('ip')">IP Address <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="version"   onclick="sortBy('version')">Firmware <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="uptime"    onclick="sortBy('uptime')">Uptime <span class="sort-arrow"></span></th>
            </tr>
          </thead>
          <tbody id="device-tbody"></tbody>
        </table>
      </div>`;

    loadEl.style.display = "none";
    contEl.style.display = "block";
    updateSortHeaders();
    renderTable();

  } catch (err) {
    loadEl.style.display = "none";
    errEl.style.display  = "block";
    errEl.textContent    = `Error loading inventory: ${err.message}`;
  }
}

function setType(t, btn) {
  typeFilter = t;
  document.querySelectorAll(".type-btn").forEach(b => b.classList.toggle("active", b.dataset.type === t));
  selectedIds.clear();
  renderTable();
}

function onSearch(val) {
  searchTerm = val;
  renderTable();
}

load();
</script>
</body>
</html>
